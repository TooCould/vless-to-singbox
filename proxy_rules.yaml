# auto 模式：默认走代理。
# - 所有 *.cn 直连（代码内置，不可被 proxy_domain 覆盖）
# - geosite-cn / geoip-cn 命中的国内站直连
# - direct_process / direct_domain 为额外直连例外
# - proxy_domain 强制走代理（覆盖 geosite-cn 里的同品牌条目；不可写 .cn）

# 混合代理(SOCKS/HTTP)监听端口。auto 模式系统代理也指向该端口，
# proxy_settings.py 与 run_singbox_auto.py 均以此为唯一来源。
listen_port: 2808

direct_process:
  - Feishu.exe
  - YoudaoDict.exe
  - YoudaoDictHelper.exe
  - YoudaoEH.exe
  - YoudaoOcr.exe
  - AweSun.exe
  - awesun_guard.exe
  - 量子密信.exe
  - lxmeeting.exe

# 额外指定需要直连的域名（后缀匹配）。
direct_domain:
  - doubao.com
  - deepseek.com

# 强制走代理（后缀匹配；不可使用 .cn 域名）。
